name: ML CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t ml-devops-demo .

      - name: Run Docker container
        run: docker run -d -p 5000:5000 ml-devops-demo
      
      - name: Deploy container
        run: docker run ml-devops-demo



